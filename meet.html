<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=https://meet.google.com/ows-nske-hdb">
  <meta name="robots" content="noindex, nofollow">
  <title>Joining your Train Taekwondo session...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Lato', Arial, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .card {
      max-width: 480px;
      width: 100%;
    }
    .logo {
      font-family: 'Russo One', Impact, sans-serif;
      font-size: 1.4rem;
      color: #e8c414;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .spinner {
      width: 56px;
      height: 56px;
      border: 4px solid rgba(232,196,20,0.2);
      border-top-color: #e8c414;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 28px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #ffffff;
    }
    p {
      color: #aaaaaa;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .btn {
      display: inline-block;
      background: #e8c414;
      color: #0a0a0a;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      letter-spacing: 0.5px;
    }
    .btn:hover { background: #f0d020; }
  </style>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-J4YNS2XYEZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-J4YNS2XYEZ');
  </script>
</head>
<body>
  <div class="card">
    <div class="logo">Train Taekwondo Schools</div>
    <div class="spinner"></div>
    <h1>Joining your session...</h1>
    <p>You are being redirected to your Google Meet session with Mr Cook. If you are not redirected automatically, tap the button below.</p>
    <a href="https://meet.google.com/ows-nske-hdb" class="btn">Join Google Meet →</a>
  </div>
</body>
</html>
